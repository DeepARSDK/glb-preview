<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #262626; }
  model-viewer {
    width: 100%;
    height: 100%;
    --poster-color: transparent;
    --progress-bar-color: rgba(255,255,255,0.2);
  }
  model-viewer::part(default-progress-bar) { display: none; }
  model-viewer .interaction-prompt { display: none !important; }
  model-viewer .pan-target { display: none !important; }
  model-viewer::part(default-pan-target) { display: none; }

  .toolbar {
    position: fixed;
    top: 8px;
    right: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 10;
    padding: 4px;
    border-radius: 8px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .toolbar button {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    background: transparent;
    color: rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.15); }
  .toolbar button.active { background: rgba(255,255,255,0.2); color: white; }
  .toolbar .sep { height: 1px; background: rgba(255,255,255,0.1); margin: 2px 3px; }
  .toolbar svg {
    width: 14px; height: 14px;
    fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round;
  }

  .playback {
    position: fixed;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 6px;
    z-index: 10;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 200px;
    max-width: 80%;
  }
  .playback button {
    width: 22px;
    height: 22px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .playback button:hover { background: rgba(255,255,255,0.15); }
  .playback svg {
    width: 12px; height: 12px;
    fill: currentColor; stroke: none;
  }
  .playback input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .playback input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
  }
  .playback .time {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    min-width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  .error {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.5);
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    text-align: center;
    max-width: 80%;
  }
</style>
</head>
<body>
<script type="module" src="model-viewer.min.js"></script>

<div class="toolbar">
  <button id="bgToggle" title="Toggle background">&#9681;</button>
  <div class="sep"></div>
  <button id="rotateToggle" class="active" title="Auto-rotate">&#8635;</button>
  <div class="sep"></div>
  <button id="resetCamera" title="Reset camera">
    <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><line x1="8" y1="4" x2="8" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="4" y1="8" x2="12" y2="8" stroke="currentColor" stroke-width="1.5"/></svg>
  </button>
</div>

<div class="playback" id="playback">
  <button id="playPause" title="Play/Pause">
    <svg id="pauseIcon" viewBox="0 0 12 12"><rect x="2" y="1" width="3" height="10" rx="0.5"/><rect x="7" y="1" width="3" height="10" rx="0.5"/></svg>
    <svg id="playIcon" viewBox="0 0 12 12" style="display:none;"><polygon points="2,1 11,6 2,11"/></svg>
  </button>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <span class="time" id="timeDisplay">0.0s</span>
</div>

<model-viewer
  id="viewer"
  camera-controls
  auto-rotate
  auto-rotate-delay="0"
  rotation-per-second="45deg"
  interaction-prompt="none"
  min-field-of-view="5deg"
  max-field-of-view="120deg"
  shadow-intensity="0.5"
  environment-image="neutral"
  style="background: #262626;"
  autoplay
><div slot="pan-target" style="display:none;"></div></model-viewer>

<div class="error" id="error" style="display:none;"></div>

<script>
  const backgrounds = ['#262626', '#808080', '#d9d9d9', '#ffffff'];
  let bgIndex = 0;
  let autoRotate = true;
  let isPlaying = true;
  let isScrubbing = false;
  const viewer = document.getElementById('viewer');
  const errorEl = document.getElementById('error');
  const playback = document.getElementById('playback');
  const scrubber = document.getElementById('scrubber');
  const timeDisplay = document.getElementById('timeDisplay');
  const pauseIcon = document.getElementById('pauseIcon');
  const playIcon = document.getElementById('playIcon');

  // Use mousedown for all buttons - fires immediately on press
  document.getElementById('bgToggle').addEventListener('mousedown', (e) => {
    e.preventDefault();
    bgIndex = (bgIndex + 1) % backgrounds.length;
    const bg = backgrounds[bgIndex];
    viewer.style.background = bg;
    document.body.style.background = bg;
  });

  const rotateBtn = document.getElementById('rotateToggle');
  rotateBtn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    autoRotate = !autoRotate;
    if (autoRotate) {
      viewer.setAttribute('auto-rotate', '');
      rotateBtn.classList.add('active');
    } else {
      viewer.removeAttribute('auto-rotate');
      rotateBtn.classList.remove('active');
    }
  });

  document.getElementById('resetCamera').addEventListener('mousedown', (e) => {
    e.preventDefault();
    viewer.cameraOrbit = 'auto auto auto';
    viewer.cameraTarget = 'auto auto auto';
    viewer.fieldOfView = 'auto';
    viewer.jumpCameraToGoal();
  });

  document.getElementById('playPause').addEventListener('mousedown', (e) => {
    e.preventDefault();
    isPlaying = !isPlaying;
    if (isPlaying) {
      viewer.timeScale = 1;
      pauseIcon.style.display = '';
      playIcon.style.display = 'none';
    } else {
      viewer.timeScale = 0;
      pauseIcon.style.display = 'none';
      playIcon.style.display = '';
    }
  });

  scrubber.addEventListener('mousedown', () => { isScrubbing = true; });
  scrubber.addEventListener('input', () => {
    const duration = viewer.duration;
    if (duration > 0) {
      const t = (scrubber.value / 1000) * duration;
      viewer.currentTime = t;
      timeDisplay.textContent = t.toFixed(1) + 's';
    }
  });
  scrubber.addEventListener('mouseup', () => { isScrubbing = false; });

  function updatePlayback() {
    if (!isScrubbing && viewer.duration > 0) {
      const progress = (viewer.currentTime / viewer.duration) * 1000;
      scrubber.value = progress;
      timeDisplay.textContent = viewer.currentTime.toFixed(1) + 's';
    }
    requestAnimationFrame(updatePlayback);
  }

  viewer.addEventListener('load', () => {
    if (viewer.availableAnimations && viewer.availableAnimations.length > 0) {
      playback.style.display = 'flex';
      requestAnimationFrame(updatePlayback);
    }
  });

  viewer.addEventListener('error', () => {
    errorEl.textContent = 'Failed to load model';
    errorEl.style.display = 'block';
  });

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'loadModel') {
      viewer.src = e.data.url;
    }
  });

  const params = new URLSearchParams(window.location.search);
  const src = params.get('src');
  if (src) viewer.src = src;
</script>
</body>
</html>
